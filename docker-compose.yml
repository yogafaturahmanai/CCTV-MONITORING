version: '3.8'

services:
  cctv-dashboard:
    build: .
    container_name: cctv-monitoring-dashboard
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/app/prisma/data/production.db
      - JWT_SECRET=ati_cctv_monitoring_secret_key
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_TO=${EMAIL_TO}
    volumes:
      - cctv-db-data:/app/prisma/data
    restart: always

volumes:
  cctv-db-data:
